<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Monitoreo</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <h1>Sistema Monitoreo</h1>
    </header>
    <main>
        <section id="ping">
            <h2>Ping</h2>
            <button id="ping-btn">Enviar Ping</button>
            <p id="ping-response"></p>
        </section>
        <section id="time">
            <h2>Tiempo</h2>
            <button id="time-btn">Obtener Tiempo</button>
            <p id="time-response"></p>
        </section>
        <section id="status">
            <h2>Estado del Sistema</h2>
            <button id="status-btn">Obtener Estado</button>
            <p id="status-response"></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
